shadow = false;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;

fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;

frame-opacity = 0.9;

corner-radius = 0

blur-kern = "3x3box";

backend = "glx"

dithered-present = false;

vsync = true;

detect-rounded-corners = true;

detect-client-opacity = true;

use-ewmh-active-win = true;

detect-transient = true;

use-damage = true;

xrender-sync-fence = true;
